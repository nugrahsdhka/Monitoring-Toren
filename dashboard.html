<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tank Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        .glass { background: rgba(16, 185, 129, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-emerald-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Tank Monitoring</h1>
                <p class="text-emerald-500/60">Sistem Monitoring Tangki Air IoT</p>
            </div>
            <div id="status-badge" class="px-3 py-1 rounded-full text-xs font-mono bg-slate-900 border border-slate-700 text-slate-400">
                Menghubungkan...
            </div>
        </header>

        <div class="grid md:grid-cols-3 gap-4 mb-8">
            <div class="md:col-span-2 glass p-6 rounded-3xl flex items-center justify-between">
                <div>
                    <p class="text-sm text-emerald-500/60 uppercase tracking-widest font-semibold">Status Tangki</p>
                    <h2 id="status-tangki" class="text-4xl font-bold mt-1 text-emerald-400">-</h2>
                </div>
                <div id="level-circle" class="w-20 h-20 rounded-full border-4 border-emerald-500/20 flex items-center justify-center font-bold text-xl">
                    <span id="level-persen">0%</span>
                </div>
            </div>
            <div class="glass p-6 rounded-3xl">
                <p class="text-sm text-emerald-500/60 uppercase tracking-widest font-semibold">Jarak Sensor</p>
                <h2 id="jarak-air" class="text-3xl font-bold mt-2 font-mono">0 cm</h2>
            </div>
        </div>

        <div class="glass rounded-3xl p-6">
            <h3 class="text-lg font-semibold mb-4">Riwayat Aktivitas</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-emerald-500/40 uppercase text-xs">
                        <tr>
                            <th class="pb-3">Waktu</th>
                            <th class="pb-3">Status</th>
                            <th class="pb-3">Level</th>
                        </tr>
                    </thead>
                    <tbody id="log-table" class="divide-y divide-emerald-500/10">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
